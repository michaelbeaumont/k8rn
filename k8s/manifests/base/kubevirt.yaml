---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevirt
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-sync-base
    namespace: flux-system
  path: ./k8s/manifests/base/kubevirt
  prune: true
  timeout: 10m
  deletionPolicy: WaitForTermination
