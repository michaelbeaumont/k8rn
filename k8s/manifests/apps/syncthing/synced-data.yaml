---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: syncthing-synced-data
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: synced-shared-data
  csi:
    driver: zfs.csi.openebs.io
    fsType: zfs
    volumeAttributes:
      openebs.io/poolname: data
    volumeHandle: shared
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8rn-core
  persistentVolumeReclaimPolicy: Retain
  storageClassName: openebs-zfs-data
  volumeMode: Filesystem
---
apiVersion: zfs.openebs.io/v1
kind: ZFSVolume
metadata:
  name: shared
  namespace: openebs
  finalizers:
    - k8rn/dummy-finalizer
spec:
  capacity: "3985729650688"
  fsType: zfs
  ownerNodeID: k8rn-core
  poolName: data
  volumeType: DATASET
  shared: "yes"
status:
  state: Ready
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: synced-shared-data
spec:
  storageClassName: openebs-zfs-data
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  volumeName: syncthing-synced-data
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: synced-data-backup-local
spec:
  sourcePVC: synced-shared-data
  trigger:
    schedule: "45 6-18/12 * * *"
  restic:
    pruneIntervalDays: 14
    moverSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    repository: restic-config-synced-data-local
    retain:
      hourly: 6
      daily: 5
      weekly: 4
      monthly: 2
      yearly: 1
    copyMethod: Snapshot
    storageClassName: openebs-zfs-data-delete
    cacheStorageClassName: openebs-single-replica-delete
    cacheCapacity: 5Gi
    volumeSnapshotClassName: openebs-zfs-localpv-delete
    moverVolumes:
      - mountPath: local-backups
        volumeSource:
          persistentVolumeClaim:
            claimName: synced-data-backup-local
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: syncthing-synced-data-backup-local
spec:
  capacity:
    storage: 1Ti
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: synced-data-backup-local
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /var/mnt/backup
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8rn-core
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synced-data-backup-local
spec:
  volumeName: syncthing-synced-data-backup-local
  storageClassName: local-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti
