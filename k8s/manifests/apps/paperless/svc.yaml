---
apiVersion: v1
kind: Service
metadata:
  name: paperless
spec:
  ports:
    - port: 80
      targetPort: http
      name: http
      appProtocol: http
      protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: docs
  labels:
    external-dns: "true"
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Docs
    gethomepage.dev/icon: paperless
    gethomepage.dev/group: Apps
    gethomepage.dev/pod-selector: app.kubernetes.io/name=paperless
spec:
  parentRefs:
    - name: services
      namespace: infra
      sectionName: main
  hostnames: []
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: paperless
          port: 80
