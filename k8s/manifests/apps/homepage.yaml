---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homepage
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-sync-apps
    namespace: flux-system
  path: ./k8s/manifests/apps/homepage
  prune: true
  timeout: 10m
  deletionPolicy: WaitForTermination
  postBuild:
    substitute:
      services_hostname_suffix: "${services_hostname_suffix}"
