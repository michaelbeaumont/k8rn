apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: headlamp
patches:
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: headlamp
      spec:
        hostnames:
          - headlamp.${services_hostname_suffix}
resources:
- namespace.yaml
- oidc.yaml
- headlamp.yaml
