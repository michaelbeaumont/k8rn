apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-disks
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  disks-k8rn-core.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 13,
          "panels": [],
          "repeat": "volumes",
          "title": "Volume: $volumes",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "displayName": "${__field.name}",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": 0
                  },
                  {
                    "color": "green",
                    "value": 20
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 7,
            "x": 0,
            "y": 1
          },
          "id": 4,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "sizing": "auto",
            "text": {}
          },
          "pluginVersion": "12.4.2",
          "repeatDirection": "v",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "label_replace(max by(mountpoint) (node_filesystem_avail_bytes{job=\"node-exporter\", fstype!=\"\", mountpoint=\"$volumes\"}), \"mountpoint\", \"$1\", \"mountpoint\", \"^/var/mnt/(.*)\")",
              "legendFormat": "__auto",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "label_replace(max by(mountpoint) (node_filesystem_size_bytes{job=\"node-exporter\", fstype!=\"\", mountpoint=\"$volumes\"}), \"mountpoint\", \"$1\", \"mountpoint\", \"^/var/mnt/(.*)\")",
              "instant": false,
              "legendFormat": "__auto",
              "range": true,
              "refId": "B"
            },
            {
              "datasource": {
                "type": "__expr__",
                "uid": "${DS_EXPRESSION}"
              },
              "expression": "$A / $B * 100",
              "refId": "Free",
              "type": "math"
            }
          ],
          "title": "",
          "transformations": [
            {
              "id": "filterByRefId",
              "options": {
                "include": "/^(?:Free)$/"
              }
            }
          ],
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "fixedColor": "green",
                "mode": "fixed"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  }
                ]
              },
              "unit": "bytes"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byFrameRefID",
                  "options": "A"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Free"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byFrameRefID",
                  "options": "B"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Total"
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 6,
            "w": 7,
            "x": 7,
            "y": 1
          },
          "id": 12,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "value_and_name",
            "wideLayout": true
          },
          "pluginVersion": "12.4.2",
          "repeatDirection": "v",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "max by(mountpoint) (node_filesystem_avail_bytes{job=\"node-exporter\", fstype!=\"\", mountpoint=\"$volumes\"})",
              "legendFormat": "__auto",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "max by(mountpoint) (node_filesystem_size_bytes{job=\"node-exporter\", fstype!=\"\", mountpoint=\"$volumes\"})",
              "instant": false,
              "legendFormat": "__auto",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "",
          "transformations": [
            {
              "id": "filterByRefId",
              "options": {
                "include": "/^(?:A|B)$/"
              }
            }
          ],
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "id": 8,
          "panels": [],
          "title": "ZFS pool: data",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "displayName": "${__field.name}",
              "fieldMinMax": false,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": 0
                  },
                  {
                    "color": "green",
                    "value": 20
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 7,
            "x": 0,
            "y": 15
          },
          "id": 2,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "sizing": "auto"
          },
          "pluginVersion": "12.4.2",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "builder",
              "exemplar": false,
              "expr": "max by(pool) (zfs_pool_free_bytes{pool=\"data\"})",
              "hide": true,
              "legendFormat": "__auto",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "builder",
              "expr": "max by(pool) (zfs_pool_size_bytes{pool=\"data\"})",
              "hide": true,
              "instant": false,
              "legendFormat": "__auto",
              "range": true,
              "refId": "B"
            },
            {
              "datasource": {
                "type": "__expr__",
                "uid": "${DS_EXPRESSION}"
              },
              "expression": "$A / $B * 100",
              "refId": "Free",
              "type": "math"
            }
          ],
          "title": "",
          "transformations": [
            {
              "id": "filterByRefId",
              "options": {
                "include": "/^(?:Free)$/"
              }
            }
          ],
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "footer": {
                  "reducers": []
                },
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 0.8
                  },
                  {
                    "color": "red",
                    "value": 0.9
                  }
                ]
              },
              "unit": "bytes"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Used, %"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "percentunit"
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "mode": "lcd",
                      "type": "gauge",
                      "valueDisplayMode": "text"
                    }
                  },
                  {
                    "id": "decimals",
                    "value": 1
                  },
                  {
                    "id": "max",
                    "value": 1
                  },
                  {
                    "id": "min",
                    "value": 0
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 9,
            "w": 14,
            "x": 7,
            "y": 15
          },
          "id": 9,
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          },
          "pluginVersion": "12.4.2",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "editorMode": "builder",
              "expr": "label_replace(max by(name) (zfs_dataset_used_bytes{job=\"zfs-exporter\"}), \"name\", \"$1\", \"name\", \"^data/(.*)\")",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "builder",
              "exemplar": false,
              "expr": "max(zfs_pool_size_bytes{pool=\"data\"})",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "B"
            }
          ],
          "title": "",
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Value #B": false,
                  "{__name__=\"zfs_pool_size_bytes\", cluster=\"k8rn\", container=\"zfs-exporter\", endpoint=\"http\", instance=\"[fdd2:14fe:fb0:3::d2d]:9134\", job=\"zfs-exporter\", namespace=\"observability\", pod=\"zfs-exporter-qkzgw\", pool=\"data\", service=\"zfs-exporter\"}": false
                },
                "includeByName": {},
                "indexByName": {
                  "Time": 0,
                  "Value": 2,
                  "name": 1,
                  "{__name__=\"zfs_pool_size_bytes\", cluster=\"k8rn\", container=\"zfs-exporter\", endpoint=\"http\", instance=\"[fdd2:14fe:fb0:3::d2d]:9134\", job=\"zfs-exporter\", namespace=\"observability\", pod=\"zfs-exporter-qkzgw\", pool=\"data\", service=\"zfs-exporter\"}": 3
                },
                "orderByMode": "manual",
                "renameByName": {
                  "Value": "Size",
                  "Value #A": "Size",
                  "Value #A (lastNotNull)": "Size",
                  "Value #B": "Pool size",
                  "Value #B (lastNotNull)": "Available",
                  "mountpoint": "Mounted on",
                  "name": "Dataset",
                  "{__name__=\"zfs_pool_size_bytes\", cluster=\"k8rn\", container=\"zfs-exporter\", endpoint=\"http\", instance=\"[fdd2:14fe:fb0:3::d2d]:9134\", job=\"zfs-exporter\", namespace=\"observability\", pod=\"zfs-exporter-qkzgw\", pool=\"data\", service=\"zfs-exporter\"}": "Pool size"
                }
              }
            },
            {
              "id": "sortBy",
              "options": {
                "fields": {},
                "sort": [
                  {
                    "desc": true,
                    "field": "Size"
                  }
                ]
              }
            },
            {
              "id": "filterByValue",
              "options": {
                "filters": [
                  {
                    "config": {
                      "id": "equal",
                      "options": {
                        "value": "data"
                      }
                    },
                    "fieldName": "Dataset"
                  }
                ],
                "match": "any",
                "type": "exclude"
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Used, %",
                "binary": {
                  "left": {
                    "matcher": {
                      "id": "byName",
                      "options": "Size"
                    }
                  },
                  "operator": "/",
                  "right": {
                    "matcher": {
                      "id": "byName",
                      "options": "Pool size"
                    }
                  }
                },
                "mode": "binary",
                "reduce": {
                  "reducer": "sum"
                },
                "replaceFields": false
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Pool size": true
                },
                "includeByName": {},
                "indexByName": {},
                "renameByName": {}
              }
            }
          ],
          "type": "table"
        }
      ],
      "preload": false,
      "schemaVersion": 42,
      "tags": [],
      "templating": {
        "list": [
          {
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            },
            "label": "Data Source",
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          },
          {
            "allowCustomValue": false,
            "current": {
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(node_filesystem_avail_bytes,mountpoint)",
            "includeAll": true,
            "label": "Volumes",
            "multi": true,
            "name": "volumes",
            "options": [],
            "query": {
              "qryType": 1,
              "query": "label_values(node_filesystem_avail_bytes,mountpoint)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 2,
            "regex": "(?<value>\\/var\\/mnt\\/(?<text>.*))",
            "regexApplyTo": "text",
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Disks / k8rn-core",
      "uid": "miqdzb7",
      "version": 1,
      "weekStart": ""
    }
