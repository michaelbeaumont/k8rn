---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: injecttzs.k8rn.${services_hostname_suffix}
spec:
  group: k8rn.${services_hostname_suffix}
  names:
    kind: InjectTZ
    plural: injecttzs
    singular: injecttz
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                tz:
                  type: string
                zoneinfoImageRef:
                  type: string
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicy
metadata:
  name: inject-berlin-tz
spec:
  paramKind:
    apiVersion: k8rn.${services_hostname_suffix}/v1
    kind: InjectTZ
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: |
          Object{
            spec: Object.spec{
              containers: object.spec.containers.map(c,
                Object.spec.containers{
                  name: c.name,
                  env: (!has(c.env) || !c.env.exists(e, e.name == "TZ")) ?
                    [
                      Object.spec.containers.env{
                        name: "TZ",
                        value: params.spec.tz,
                      },
                    ] : [],
                  volumeMounts: (!has(c.volumeMounts) || !c.volumeMounts.exists(v, v.name == "tz-data")) ?
                    [
                      Object.spec.containers.volumeMounts{
                        name: "tz-data",
                        mountPath: "/usr/share/zoneinfo",
                        readOnly: true,
                        subPath: "usr/share/zoneinfo",
                      },
                    ] : [],
                }
              ),
              volumes: (!has(object.spec.volumes) || !object.spec.volumes.exists(v, v.name == "tz-data")) ?
                [
                  Object.spec.volumes{
                    name: "tz-data",
                    image: Object.spec.volumes.image{
                      reference: params.spec.zoneinfoImageRef,
                    },
                  },
                ] : [],
            },
          }
---
apiVersion: k8rn.${services_hostname_suffix}/v1
kind: InjectTZ
metadata:
  name: inject-berlin-tz
spec:
  tz: Europe/Berlin
  zoneinfoImageRef: ghcr.io/michaelbeaumont/tzdata:2026b
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: inject-berlin-tz
spec:
  policyName: inject-berlin-tz
  matchResources: {}
  paramRef:
    name: inject-berlin-tz
    parameterNotFoundAction: Deny
